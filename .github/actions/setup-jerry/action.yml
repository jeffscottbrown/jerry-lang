name: Setup Jerry
description: Install the Jerry language compiler and add it to PATH.

inputs:
  version:
    description: Jerry version to install (e.g. "v0.1.4"). Defaults to the latest release.
    required: false
    default: latest

runs:
  using: composite
  steps:
    - name: Resolve version
      shell: bash
      run: |
        if [ "${{ inputs.version }}" = "latest" ]; then
          VERSION=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/jeffscottbrown/jerry-lang/releases/latest \
            | grep '"tag_name"' \
            | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/')
          [ -n "$VERSION" ] || { echo "::error::Could not resolve latest Jerry version"; exit 1; }
        else
          VERSION="${{ inputs.version }}"
        fi
        echo "JERRY_VERSION=$VERSION" >> "$GITHUB_ENV"

    - name: Detect platform
      shell: bash
      run: |
        OS=$(uname -s)
        ARCH=$(uname -m)
        case "$OS" in
          Linux)  OS_KEY="linux" ;;
          Darwin) OS_KEY="macos" ;;
          *)      echo "::error::Unsupported OS: $OS"; exit 1 ;;
        esac
        case "$ARCH" in
          x86_64)        ARCH_KEY="x86_64" ;;
          arm64|aarch64) ARCH_KEY="arm64"  ;;
          *)             echo "::error::Unsupported architecture: $ARCH"; exit 1 ;;
        esac
        echo "JERRY_ASSET=jerry-${OS_KEY}-${ARCH_KEY}" >> "$GITHUB_ENV"

    - name: Download and install
      shell: bash
      run: |
        URL="https://github.com/jeffscottbrown/jerry-lang/releases/download/${JERRY_VERSION}/${JERRY_ASSET}.tar.gz"
        CHECKSUMS_URL="https://github.com/jeffscottbrown/jerry-lang/releases/download/${JERRY_VERSION}/checksums.txt"

        curl -fsSL "$URL"          -o "$RUNNER_TEMP/${JERRY_ASSET}.tar.gz"
        curl -fsSL "$CHECKSUMS_URL" -o "$RUNNER_TEMP/checksums.txt"

        cd "$RUNNER_TEMP"
        EXPECTED=$(grep "${JERRY_ASSET}.tar.gz" checksums.txt | awk '{print $1}')
        ACTUAL=$(openssl dgst -sha256 -r "${JERRY_ASSET}.tar.gz" | awk '{print $1}')
        [ "$EXPECTED" = "$ACTUAL" ] || { echo "::error::Checksum mismatch for ${JERRY_ASSET}.tar.gz"; exit 1; }
        tar -xzf "${JERRY_ASSET}.tar.gz"
        chmod +x "${JERRY_ASSET}"
        mv "${JERRY_ASSET}" jerry
        if [ -f jerry-compiler ]; then
          chmod +x jerry-compiler
        fi
        if [ -f jerry-test ]; then
          chmod +x jerry-test
        fi
        if [ -f jerry-create ]; then
          chmod +x jerry-create
        fi
        if [ -f jerry-sweep ]; then
          chmod +x jerry-sweep
        fi
        if [ -f jerry-lsp ]; then
          chmod +x jerry-lsp
        fi
        if [ -f jerry-get ]; then
          chmod +x jerry-get
        fi
        if [ -f jerry-parse ]; then
          chmod +x jerry-parse
        fi

        echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

        # Expose compiler, runtime, stdlib, and grammar paths so consumer projects
        # can compile and validate Jerry programs without any additional setup.
        echo "JERRY_COMPILER=$RUNNER_TEMP/jerry-compiler" >> "$GITHUB_ENV"
        if [ -f "$RUNNER_TEMP/jerry_runtime.a" ]; then
          echo "JERRY_RUNTIME=$RUNNER_TEMP/jerry_runtime.a" >> "$GITHUB_ENV"
        fi
        if [ -d "$RUNNER_TEMP/stdlib" ]; then
          echo "JERRY_STDLIB=$RUNNER_TEMP/stdlib" >> "$GITHUB_ENV"
        fi
        if [ -f "$RUNNER_TEMP/grammar/jerry.peg" ]; then
          echo "JERRY_GRAMMAR=$RUNNER_TEMP/grammar/jerry.peg" >> "$GITHUB_ENV"
        fi
        if [ -f "$RUNNER_TEMP/jerry-parse" ]; then
          echo "JERRY_PARSE=$RUNNER_TEMP/jerry-parse" >> "$GITHUB_ENV"
        fi

    - name: Verify
      shell: bash
      run: jerry --version
