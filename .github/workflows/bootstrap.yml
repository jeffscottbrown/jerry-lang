name: Bootstrap Release

# One-shot workflow: build a jerry-compiler seed binary for a given platform
# and upload it to an existing (pre-)release. Used when the current "latest"
# release is too old to compile the current self-host/.
#
# All platforms use the same path: download a seed jerry-compiler from
# seed_version, emit LLVM IR for self-host/ on macOS, then compile the IR with
# clang (using cross-compilation for non-arm64 targets).
#
# Usage:
#   1. Create a pre-release tag manually (e.g. v0.9.0-bootstrap) via gh CLI:
#        gh release create v0.9.0-bootstrap --prerelease --title "v0.9.0-bootstrap" --notes ""
#   2. Trigger once per platform:
#        gh workflow run bootstrap.yml \
#          -f release_tag=v0.9.0-bootstrap \
#          -f seed_version=<last-known-good-release> \
#          -f platform=macos-arm64
#        gh workflow run bootstrap.yml \
#          -f release_tag=v0.9.0-bootstrap \
#          -f seed_version=v0.9.0-bootstrap \
#          -f platform=macos-x86_64
#        gh workflow run bootstrap.yml \
#          -f release_tag=v0.9.0-bootstrap \
#          -f seed_version=v0.9.0-bootstrap \
#          -f platform=linux-x86_64
#   3. Trigger release.yml via workflow_dispatch with the bootstrap as seed:
#        gh workflow run release.yml -f tag=v0.9.0

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Pre-release tag to upload to (e.g. v0.9.0-bootstrap)"
        required: true
      seed_version:
        description: "Seed jerry-compiler release to download (e.g. v0.8.6)"
        required: true
      platform:
        description: "Platform to build for"
        required: true
        default: macos-arm64
        type: choice
        options:
          - macos-arm64
          - macos-x86_64
          - linux-x86_64

permissions:
  contents: write

jobs:
  build:
    name: Bootstrap ${{ inputs.platform }}
    runs-on: macos-latest   # always macOS; IR cross-compilation handles other targets

    steps:
      - uses: actions/checkout@v6

      - name: Install cross-compilation toolchain (Linux target)
        if: inputs.platform == 'linux-x86_64'
        run: brew install llvm

      - name: Build runtime library
        run: |
          CC_ARCH=""
          if [ "${{ inputs.platform }}" = "macos-x86_64" ]; then
            CC_ARCH="-arch x86_64"
          fi
          cc -O2 $CC_ARCH -c runtime/src/runtime.c -Iruntime/src -o jerry_runtime.o
          ar rcs jerry_runtime.a jerry_runtime.o

      - name: Build stdlib
        run: |
          mkdir -p stdlib-dist
          cp stdlib/*.jer stdlib-dist/

      - name: Download seed jerry-compiler
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ inputs.seed_version }}" \
            --repo jeffscottbrown/jerry-lang \
            --pattern "jerry-macos-arm64.tar.gz"
          tar xf jerry-macos-arm64.tar.gz jerry-compiler
          chmod +x jerry-compiler

      - name: Emit IR for current self-host/
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          ./jerry-compiler self-host/ --ir > self-host.ll
          wc -l self-host.ll

      - name: Compile IR to jerry-compiler-new
        run: |
          case "${{ inputs.platform }}" in
            macos-arm64)
              clang -O0 self-host.ll jerry_runtime.a -o jerry-compiler-new -lm
              ;;
            macos-x86_64)
              clang -target x86_64-apple-darwin -O0 self-host.ll jerry_runtime.a -o jerry-compiler-new -lm
              ;;
            linux-x86_64)
              # Use the LLVM cross-compiler installed via brew.
              LLVM_BIN=$(brew --prefix llvm)/bin
              "$LLVM_BIN/clang" -target x86_64-linux-gnu -O0 self-host.ll jerry_runtime.a -o jerry-compiler-new -lm
              ;;
          esac
          chmod +x jerry-compiler-new

      - name: Smoke-test new compiler (arm64 only)
        if: inputs.platform == 'macos-arm64'
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          ./jerry-compiler-new examples/hello.jer -o hello-test
          ./hello-test

      - name: Package and upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          case "${{ inputs.platform }}" in
            linux-x86_64)  ASSET_NAME="jerry-linux-x86_64" ;;
            macos-arm64)   ASSET_NAME="jerry-macos-arm64" ;;
            macos-x86_64)  ASSET_NAME="jerry-macos-x86_64" ;;
          esac
          cp jerry-compiler-new jerry-compiler
          tar -czf "${ASSET_NAME}.tar.gz" jerry-compiler
          gh release upload "${{ inputs.release_tag }}" "${ASSET_NAME}.tar.gz" --clobber
