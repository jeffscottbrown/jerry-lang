name: CI

on:
  push:
    branches: [main, master]
    tags-ignore: ["**"]   # release.yml handles tag pushes
  pull_request:
    branches: [main, master]

# Cancel in-progress CI runs for the same branch when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Compile self-host/ to LLVM IR on macOS ────────────────────────────────
  # Generating IR on macOS avoids the OOM issue that occurs when a
  # Jerry-compiled binary compiles the large self-host/ codebase on Linux
  # runners.  The IR is platform-independent and compiled with clang in each
  # matrix job below.
  compiler-ir:
    name: Build compiler IR
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build runtime library
        run: |
          cc -O2 -c runtime/src/runtime.c -Iruntime/src -o jerry_runtime.o
          ar rcs jerry_runtime.a jerry_runtime.o

      - name: Install stdlib
        run: |
          mkdir -p stdlib-dist
          cp stdlib/*.jer stdlib-dist/

      - name: Download seed jerry-compiler from latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(gh release list --repo jeffscottbrown/jerry-lang --limit 1 --json tagName --jq '.[0].tagName')
          gh release download "$LATEST" --repo jeffscottbrown/jerry-lang --pattern "jerry-macos-arm64.tar.gz"
          tar xf jerry-macos-arm64.tar.gz jerry-compiler
          chmod +x jerry-compiler

      - name: Compile self-host/ to LLVM IR
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          ./jerry-compiler self-host/ --ir > self-host.ll

      - name: Upload IR artifact
        uses: actions/upload-artifact@v7
        with:
          name: compiler-ir
          path: self-host.ll
          retention-days: 1

  # ── Test on each platform ─────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    needs: compiler-ir
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15]

    steps:
      - uses: actions/checkout@v4

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang

      - name: Build runtime library
        run: |
          cc -O2 -c runtime/src/runtime.c -Iruntime/src -o jerry_runtime.o
          ar rcs jerry_runtime.a jerry_runtime.o

      - name: Install stdlib
        run: |
          mkdir -p stdlib-dist
          cp stdlib/*.jer stdlib-dist/

      - name: Download compiler IR
        uses: actions/download-artifact@v4
        with:
          name: compiler-ir

      - name: Build jerry-compiler from IR
        run: |
          clang -O0 self-host.ll jerry_runtime.a -o jerry-compiler -lm
          chmod +x jerry-compiler

      - name: Build jerry-test (self-hosted)
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          ./jerry-compiler cmd/jerry-test/ -o jerry-test

      - name: Build jerry-create (self-hosted)
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          ./jerry-compiler cmd/jerry-create/ -o jerry-create

      - name: Build jerry-sweep (self-hosted)
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          ./jerry-compiler cmd/jerry-sweep/ -o jerry-sweep

      - name: Build jerry-lsp (self-hosted)
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          ./jerry-compiler cmd/jerry-lsp/ -o jerry-lsp-bin

      - name: Build jerry-main (self-hosted Jerry dispatcher)
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          ./jerry-compiler cmd/jerry-main/ -o jerry-native

      - name: Smoke-test (jerry run via self-hosted compiler)
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
          JERRY_COMPILER: ${{ github.workspace }}/jerry-compiler
          JERRY_TEST: ${{ github.workspace }}/jerry-test
          JERRY_CREATE: ${{ github.workspace }}/jerry-create
          JERRY_SWEEP: ${{ github.workspace }}/jerry-sweep
          JERRY_GET: ${{ github.workspace }}/jerry-get-bin
          JERRY_LSP: ${{ github.workspace }}/jerry-lsp-bin
        run: |
          ./jerry-native --version
          ./jerry-native run examples/hello.jer
          ./jerry-native run examples/fibonacci.jer
          ./jerry-native run examples/arrays.jer
          ./jerry-native run examples/classes.jer
          ./jerry-native run examples/closures.jer
          ./jerry-native run examples/strings.jer
          ./jerry-native create hello-smoke-test
          ./jerry-native run hello-smoke-test/main.jer
          (cd hello-smoke-test && JERRY_SWEEP=${{ github.workspace }}/jerry-sweep JERRY_COMPILER=${{ github.workspace }}/jerry-compiler ../jerry-native sweep)
          rm -rf hello-smoke-test

      - name: Jerry tests (via self-hosted compiler)
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
          JERRY_COMPILER: ${{ github.workspace }}/jerry-compiler
          JERRY_TEST: ${{ github.workspace }}/jerry-test
          JERRY_CREATE: ${{ github.workspace }}/jerry-create
          JERRY_SWEEP: ${{ github.workspace }}/jerry-sweep
          JERRY_GET: ${{ github.workspace }}/jerry-get-bin
          JERRY_LSP: ${{ github.workspace }}/jerry-lsp-bin
        run: |
          ./jerry-native test tests/arrays_test.jer
          ./jerry-native test tests/char_literal_test.jer
          ./jerry-native test tests/classes_test.jer
          ./jerry-native test tests/closures_test.jer
          ./jerry-native test tests/control_flow_test.jer
          ./jerry-native test tests/functions_test.jer
          ./jerry-native test tests/json_test.jer
          ./jerry-native test tests/map_test.jer
          ./jerry-native test tests/primitives_test.jer
          ./jerry-native test tests/stdlib_test.jer
          ./jerry-native test tests/strings_test.jer
          ./jerry-native test cmd/jerry-lsp/
          cc -O2 -c tests/extern_test.c -o extern_test.o && ar rcs libextern_test.a extern_test.o
          ./jerry-native test tests/extern_test.jer -lextern_test -L.

      - name: Smoke-test self-hosted compiler directly
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          ./jerry-compiler examples/hello.jer -o hello-selfhosted
          ./hello-selfhosted
          ./jerry-compiler examples/fibonacci.jer -o fib-selfhosted
          ./fib-selfhosted
          ./jerry-compiler examples/arrays.jer -o arrays-selfhosted
          ./arrays-selfhosted
          ./jerry-compiler examples/classes.jer -o classes-selfhosted
          ./classes-selfhosted
          ./jerry-compiler examples/closures.jer -o closures-selfhosted
          ./closures-selfhosted
          ./jerry-compiler examples/strings.jer -o strings-selfhosted
          ./strings-selfhosted

      - name: Bootstrap (jerry-compiler compiles itself)
        if: runner.os == 'macOS'
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          ./jerry-compiler self-host/ -o jerry-compiler-v2
          ./jerry-compiler-v2 cmd/jerry-test/ -o jerry-test-v2
          ./jerry-compiler-v2 cmd/jerry-create/ -o jerry-create-v2
          ./jerry-compiler-v2 cmd/jerry-sweep/ -o jerry-sweep-v2
          ./jerry-compiler-v2 cmd/jerry-lsp/ -o jerry-lsp-v2
          ./jerry-compiler-v2 cmd/jerry-main/ -o jerry-native-v2
          ./jerry-compiler-v2 examples/hello.jer -o hello-v2
          ./hello-v2
          ./jerry-compiler-v2 examples/fibonacci.jer -o fib-v2
          ./fib-v2

      - name: Jerry tests (via bootstrapped compiler)
        if: runner.os == 'macOS'
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
          JERRY_COMPILER: ${{ github.workspace }}/jerry-compiler-v2
          JERRY_TEST: ${{ github.workspace }}/jerry-test-v2
          JERRY_CREATE: ${{ github.workspace }}/jerry-create-v2
          JERRY_SWEEP: ${{ github.workspace }}/jerry-sweep-v2
          JERRY_GET: ${{ github.workspace }}/jerry-get-bin
          JERRY_LSP: ${{ github.workspace }}/jerry-lsp-v2
        run: |
          ./jerry-native-v2 test tests/strings_test.jer
          ./jerry-native-v2 test tests/arrays_test.jer
          ./jerry-native-v2 test tests/char_literal_test.jer
          ./jerry-native-v2 test tests/classes_test.jer
          ./jerry-native-v2 test tests/map_test.jer
          ./jerry-native-v2 test tests/json_test.jer
          ./jerry-native-v2 test cmd/jerry-lsp/
          ./jerry-native-v2 test tests/extern_test.jer -lextern_test -L.
