name: CI

on:
  push:
    branches: [main, master]
    tags-ignore: ["**"]   # release.yml handles tag pushes
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang

      - name: go vet
        # Participle uses non-standard struct tag syntax in internal/ast, which
        # triggers false positives from the structtag analyzer. All other packages
        # use normal tags, so we vet them normally and skip structtag for ast.
        run: |
          go vet $(go list ./... | grep -v 'jerry-lang/internal/ast')
          go vet -structtag=false github.com/jeffscottbrown/jerry-lang/internal/ast

      - name: go test
        run: go test ./...

      - name: Build jerry
        run: go build -o jerry-bin ./cmd/jerry

      - name: Build runtime library
        run: |
          cc -O2 -c runtime/src/runtime.c -Iruntime/src -o jerry_runtime.o
          ar rcs jerry_runtime.a jerry_runtime.o

      - name: Install stdlib
        run: |
          mkdir -p stdlib-dist
          cp stdlib/*.jer stdlib-dist/

      - name: Build jerry-compiler (self-hosted)
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          ./jerry-bin _ir self-host/*.jer > jerry-compiler-bootstrap.ll
          cc -O1 jerry-compiler-bootstrap.ll jerry_runtime.a -o jerry-compiler -lm
          rm jerry-compiler-bootstrap.ll

      - name: Smoke-test (jerry run via self-hosted compiler)
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
          JERRY_COMPILER: ${{ github.workspace }}/jerry-compiler
        run: |
          ./jerry-bin --version
          ./jerry-bin run examples/hello.jer
          ./jerry-bin run examples/fibonacci.jer
          ./jerry-bin run examples/arrays.jer
          ./jerry-bin run examples/classes.jer
          ./jerry-bin run examples/closures.jer
          ./jerry-bin run examples/strings.jer

      - name: Jerry tests (via self-hosted compiler)
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
          JERRY_COMPILER: ${{ github.workspace }}/jerry-compiler
        run: |
          ./jerry-bin test tests/arrays_test.jer
          ./jerry-bin test tests/classes_test.jer
          ./jerry-bin test tests/closures_test.jer
          ./jerry-bin test tests/control_flow_test.jer
          ./jerry-bin test tests/functions_test.jer
          ./jerry-bin test tests/json_test.jer
          ./jerry-bin test tests/map_test.jer
          ./jerry-bin test tests/primitives_test.jer
          ./jerry-bin test tests/stdlib_test.jer
          ./jerry-bin test tests/strings_test.jer

      - name: Smoke-test self-hosted compiler directly
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          ./jerry-compiler examples/hello.jer -o hello-selfhosted
          ./hello-selfhosted
          ./jerry-compiler examples/fibonacci.jer -o fib-selfhosted
          ./fib-selfhosted
          ./jerry-compiler examples/arrays.jer -o arrays-selfhosted
          ./arrays-selfhosted
          ./jerry-compiler examples/classes.jer -o classes-selfhosted
          ./classes-selfhosted
          ./jerry-compiler examples/closures.jer -o closures-selfhosted
          ./closures-selfhosted
          ./jerry-compiler examples/strings.jer -o strings-selfhosted
          ./strings-selfhosted

      - name: Bootstrap (jerry-compiler compiles itself)
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          ./jerry-compiler self-host/ -o jerry-compiler-v2
          ./jerry-compiler-v2 examples/hello.jer -o hello-v2
          ./hello-v2
          ./jerry-compiler-v2 examples/fibonacci.jer -o fib-v2
          ./fib-v2

      - name: Jerry tests (via bootstrapped compiler)
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
          JERRY_COMPILER: ${{ github.workspace }}/jerry-compiler-v2
        run: |
          ./jerry-bin test tests/strings_test.jer
          ./jerry-bin test tests/arrays_test.jer
          ./jerry-bin test tests/classes_test.jer
          ./jerry-bin test tests/map_test.jer
          ./jerry-bin test tests/json_test.jer
