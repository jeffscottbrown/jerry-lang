name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.8.0)"
        required: true

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  # ── Compile self-host/ to LLVM IR on macOS ────────────────────────────────
  # Generating IR on macOS avoids the OOM issue that occurs when a
  # Jerry-compiled binary compiles the large self-host/ codebase on Linux
  # runners.  The IR is platform-independent and compiled with clang in each
  # matrix job below.
  compiler-ir:
    name: Build compiler IR
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build runtime library
        run: |
          cc -O2 -c runtime/src/runtime.c -Iruntime/src -o jerry_runtime.o
          ar rcs jerry_runtime.a jerry_runtime.o

      - name: Install stdlib
        run: |
          mkdir -p stdlib-dist
          cp stdlib/*.jer stdlib-dist/

      - name: Download seed jerry-compiler from latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(gh release list --repo jeffscottbrown/jerry-lang --limit 1 --json tagName --jq '.[0].tagName')
          gh release download "$LATEST" --repo jeffscottbrown/jerry-lang --pattern "jerry-macos-arm64.tar.gz"
          tar xf jerry-macos-arm64.tar.gz jerry-compiler
          chmod +x jerry-compiler

      - name: Compile self-host/ to LLVM IR
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          ./jerry-compiler self-host/ --ir > self-host.ll

      - name: Upload IR artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiler-ir
          path: self-host.ll
          retention-days: 1

  # ── Build one binary per platform ──────────────────────────────────────────
  build:
    name: Build (${{ matrix.name }})
    needs: compiler-ir
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            cc_arch_flag: ""
            jerry_target: ""
            asset_name: jerry-linux-x86_64

          - name: macos-x86_64
            os: macos-latest
            cc_arch_flag: "-arch x86_64"
            jerry_target: "x86_64-apple-darwin"
            asset_name: jerry-macos-x86_64

          - name: macos-arm64
            os: macos-latest      # GitHub's Apple Silicon runner
            cc_arch_flag: "-arch arm64"
            jerry_target: ""
            asset_name: jerry-macos-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang

      - name: Build runtime library
        run: |
          cc -O2 ${{ matrix.cc_arch_flag }} -c runtime/src/runtime.c -Iruntime/src -o jerry_runtime.o
          ar rcs jerry_runtime.a jerry_runtime.o

      - name: Build stdlib
        run: |
          mkdir -p stdlib-dist
          cp stdlib/*.jer stdlib-dist/

      - name: Download compiler IR
        uses: actions/download-artifact@v4
        with:
          name: compiler-ir

      - name: Build jerry-compiler from IR
        run: |
          TARGET_FLAG=""
          if [ -n "${{ matrix.jerry_target }}" ]; then
            TARGET_FLAG="-target ${{ matrix.jerry_target }}"
          fi
          clang $TARGET_FLAG -O0 self-host.ll jerry_runtime.a -o jerry-compiler -lm
          chmod +x jerry-compiler

      - name: Build jerry-test
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          TARGET_FLAG=""
          if [ -n "${{ matrix.jerry_target }}" ]; then
            TARGET_FLAG="-target ${{ matrix.jerry_target }}"
          fi
          ./jerry-compiler cmd/jerry-test/ -o jerry-test $TARGET_FLAG

      - name: Build jerry-create
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          TARGET_FLAG=""
          if [ -n "${{ matrix.jerry_target }}" ]; then
            TARGET_FLAG="-target ${{ matrix.jerry_target }}"
          fi
          ./jerry-compiler cmd/jerry-create/ -o jerry-create $TARGET_FLAG

      - name: Build jerry-sweep
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          TARGET_FLAG=""
          if [ -n "${{ matrix.jerry_target }}" ]; then
            TARGET_FLAG="-target ${{ matrix.jerry_target }}"
          fi
          ./jerry-compiler cmd/jerry-sweep/ -o jerry-sweep $TARGET_FLAG

      - name: Build jerry-get
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          TARGET_FLAG=""
          if [ -n "${{ matrix.jerry_target }}" ]; then
            TARGET_FLAG="-target ${{ matrix.jerry_target }}"
          fi
          ./jerry-compiler cmd/jerry-get/ -o jerry-get $TARGET_FLAG

      - name: Build jerry-lsp
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          TARGET_FLAG=""
          if [ -n "${{ matrix.jerry_target }}" ]; then
            TARGET_FLAG="-target ${{ matrix.jerry_target }}"
          fi
          ./jerry-compiler cmd/jerry-lsp/ -o jerry-lsp $TARGET_FLAG

      - name: Build jerry-main (native Jerry dispatcher)
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          TARGET_FLAG=""
          if [ -n "${{ matrix.jerry_target }}" ]; then
            TARGET_FLAG="-target ${{ matrix.jerry_target }}"
          fi
          # Inject the release version into version.jer, compile, then restore dev default.
          echo "fn jerry_version(): string { return \"${{ env.RELEASE_TAG }}\"; }" > cmd/jerry-main/version.jer
          ./jerry-compiler cmd/jerry-main/ -o ${{ matrix.asset_name }} $TARGET_FLAG
          echo 'fn jerry_version(): string { return "dev"; }' > cmd/jerry-main/version.jer

      - name: Smoke-test binary (arm64 only)
        if: matrix.jerry_target == ''
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
          JERRY_COMPILER: ${{ github.workspace }}/jerry-compiler
          JERRY_TEST: ${{ github.workspace }}/jerry-test
          JERRY_CREATE: ${{ github.workspace }}/jerry-create
          JERRY_SWEEP: ${{ github.workspace }}/jerry-sweep
          JERRY_GET: ${{ github.workspace }}/jerry-get
          JERRY_LSP: ${{ github.workspace }}/jerry-lsp
        run: |
          ./${{ matrix.asset_name }} --version
          ./${{ matrix.asset_name }} run examples/hello.jer
          ./${{ matrix.asset_name }} run examples/fibonacci.jer
          ./${{ matrix.asset_name }} run examples/strings.jer

      - name: Create archive
        run: |
          EXTRAS=""
          [ -f jerry-compiler ] && EXTRAS="$EXTRAS jerry-compiler"
          [ -f jerry-test ]     && EXTRAS="$EXTRAS jerry-test"
          [ -f jerry-create ]   && EXTRAS="$EXTRAS jerry-create"
          [ -f jerry-sweep ]    && EXTRAS="$EXTRAS jerry-sweep"
          [ -f jerry-lsp ]      && EXTRAS="$EXTRAS jerry-lsp"
          [ -f jerry-get ]      && EXTRAS="$EXTRAS jerry-get"
          [ -f jerry_runtime.a ] && EXTRAS="$EXTRAS jerry_runtime.a"
          # Include stdlib so consumer projects (and setup-jerry) have everything
          # needed to compile Jerry programs without building from source.
          cp -r stdlib-dist stdlib
          tar -czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.asset_name }} $EXTRAS stdlib
          rm -rf stdlib

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz
          retention-days: 1

  # ── Create GitHub Release with all platform archives ───────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Jerry ${{ env.RELEASE_TAG }}"
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt

      - name: Update Homebrew tap formula
        if: ${{ !contains(env.RELEASE_TAG, '-') }}   # skip pre-releases
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          TARBALL_URL="https://github.com/jeffscottbrown/jerry-lang/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -fsSL "$TARBALL_URL" | sha256sum | awk '{print $1}')
          git clone "https://github.com/jeffscottbrown/homebrew-jerry.git" tap
          # Copy the canonical formula template from this repo and fill in the placeholders.
          # Using the template (not sed on the existing file) ensures the formula body
          # is always up to date with the source.
          mkdir -p tap/Formula
          SEED_ARM64_SHA=$(awk '/jerry-macos-arm64\.tar\.gz/{print $1}' dist/checksums.txt)
          SEED_X86_64_SHA=$(awk '/jerry-macos-x86_64\.tar\.gz/{print $1}' dist/checksums.txt)
          SEED_ARM64_URL="https://github.com/jeffscottbrown/jerry-lang/releases/download/${TAG}/jerry-macos-arm64.tar.gz"
          SEED_X86_64_URL="https://github.com/jeffscottbrown/jerry-lang/releases/download/${TAG}/jerry-macos-x86_64.tar.gz"
          sed "s|URL_PLACEHOLDER|${TARBALL_URL}|; \
               s|SHA256_PLACEHOLDER|${SHA256}|; \
               s|SEED_MACOS_ARM64_URL|${SEED_ARM64_URL}|; \
               s|SEED_MACOS_ARM64_SHA256|${SEED_ARM64_SHA}|; \
               s|SEED_MACOS_X86_64_URL|${SEED_X86_64_URL}|; \
               s|SEED_MACOS_X86_64_SHA256|${SEED_X86_64_SHA}|" \
            homebrew/jerry.rb > tap/Formula/jerry.rb
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/jeffscottbrown/homebrew-jerry.git"
          git add Formula/jerry.rb
          git commit -m "chore: update jerry to ${TAG}"
          git push
