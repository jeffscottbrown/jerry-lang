name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  # ── Build one binary per platform ──────────────────────────────────────────
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            cc_arch_flag: ""
            asset_name: jerry-linux-x86_64

          - name: macos-x86_64
            os: macos-latest
            goos: darwin
            goarch: amd64
            cc_arch_flag: "-arch x86_64"
            asset_name: jerry-macos-x86_64

          - name: macos-arm64
            os: macos-latest      # GitHub's Apple Silicon runner
            goos: darwin
            goarch: arm64
            cc_arch_flag: "-arch arm64"
            asset_name: jerry-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang

      - name: Build jerry
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-X main.Version=${{ github.ref_name }}" \
            -o ${{ matrix.asset_name }} \
            ./cmd/jerry

      - name: Build runtime library (native only)
        if: |
          (matrix.goos == 'linux' && runner.os == 'Linux') ||
          (matrix.goos == 'darwin' && runner.os == 'macOS')
        run: |
          cc -O2 ${{ matrix.cc_arch_flag }} -c runtime/src/runtime.c -Iruntime/src -o jerry_runtime.o
          ar rcs jerry_runtime.a jerry_runtime.o

      - name: Verify version string
        # Only run on native (not cross-compiled) targets
        if: |
          (matrix.goos == 'linux' && runner.os == 'Linux') ||
          (matrix.goos == 'darwin' && runner.os == 'macOS')
        run: ./${{ matrix.asset_name }} --version

      - name: Smoke-test binary (native only)
        if: |
          (matrix.goos == 'linux' && runner.os == 'Linux') ||
          (matrix.goos == 'darwin' && runner.os == 'macOS')
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
        run: |
          ./${{ matrix.asset_name }} run examples/hello.jer
          ./${{ matrix.asset_name }} run examples/fibonacci.jer
          ./${{ matrix.asset_name }} run examples/strings.jer

      - name: Create archive
        run: tar -czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.asset_name }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz
          retention-days: 1

  # ── Create GitHub Release with all platform archives ───────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Jerry ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt

      - name: Update Homebrew tap formula
        if: ${{ !contains(github.ref_name, '-') }}   # skip pre-releases
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          TARBALL_URL="https://github.com/jeffscottbrown/jerry-lang/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -fsSL "$TARBALL_URL" | sha256sum | awk '{print $1}')
          git clone "https://github.com/jeffscottbrown/homebrew-jerry.git" tap
          sed -i "s|url \".*\"|url \"${TARBALL_URL}\"|" tap/Formula/jerry.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" tap/Formula/jerry.rb
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/jeffscottbrown/homebrew-jerry.git"
          git add Formula/jerry.rb
          git commit -m "chore: update jerry to ${TAG}"
          git push
