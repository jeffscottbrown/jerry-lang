name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.7.0)"
        required: true
      seed_version:
        description: "jerry-compiler seed version to use for macOS (e.g. v0.7.0-bootstrap). Defaults to latest release."
        required: false
        default: ""

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

# Resolve the tag and seed version once so all jobs can reference them.
env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  SEED_VERSION_OVERRIDE: ${{ inputs.seed_version }}

jobs:
  # ── Build one binary per platform ──────────────────────────────────────────
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            cc_arch_flag: ""
            jerry_target: ""
            asset_name: jerry-linux-x86_64

          - name: macos-x86_64
            os: macos-latest
            goos: darwin
            goarch: amd64
            cc_arch_flag: "-arch x86_64"
            jerry_target: "x86_64-apple-darwin"
            asset_name: jerry-macos-x86_64

          - name: macos-arm64
            os: macos-latest      # GitHub's Apple Silicon runner
            goos: darwin
            goarch: arm64
            cc_arch_flag: "-arch arm64"
            jerry_target: ""
            asset_name: jerry-macos-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Linux bootstrap needs full history for git checkout 741e43b

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang

      - name: Build runtime library (native only)
        if: |
          (matrix.goos == 'linux' && runner.os == 'Linux') ||
          (matrix.goos == 'darwin' && runner.os == 'macOS')
        run: |
          cc -O2 ${{ matrix.cc_arch_flag }} -c runtime/src/runtime.c -Iruntime/src -o jerry_runtime.o
          ar rcs jerry_runtime.a jerry_runtime.o

      - name: Build stdlib (native only)
        if: |
          (matrix.goos == 'linux' && runner.os == 'Linux') ||
          (matrix.goos == 'darwin' && runner.os == 'macOS')
        run: |
          mkdir -p stdlib-dist
          cp stdlib/*.jer stdlib-dist/

      # ── Linux: bootstrap jerry-compiler from old Go codegen (no seed needed) ──
      - name: Build jerry-compiler seed from Go codegen (Linux only)
        if: runner.os == 'Linux'
        run: |
          git checkout 741e43b -- \
            cmd/jerry internal/codegen internal/checker \
            internal/parser internal/ast internal/build \
            stdlib/stdlib.go go.mod go.sum
          go build -o jerry-go-old ./cmd/jerry
          git checkout HEAD -- cmd/jerry go.mod go.sum
          rm -rf internal/codegen internal/checker internal/parser internal/ast internal/build
          rm -f stdlib/stdlib.go
          SRCS=$(ls self-host/*.jer | grep -v '_test\.jer' | sort | tr '\n' ' ')
          ./jerry-go-old _ir $SRCS > self-host-bootstrap.ll
          clang -O0 self-host-bootstrap.ll jerry_runtime.a -o jerry-compiler -lm
          chmod +x jerry-compiler

      # ── macOS: download seed and emit IR, then compile with clang ──────────────
      - name: Download seed jerry-compiler (macOS only)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$SEED_VERSION_OVERRIDE" ]; then
            VERSION="$SEED_VERSION_OVERRIDE"
          else
            VERSION=$(gh release view --repo jeffscottbrown/jerry-lang --json tagName --jq .tagName)
          fi
          case "$(uname -s)" in Darwin) OS="macos" ;; *) OS="linux" ;; esac
          ARCH=$(uname -m)
          case "$ARCH" in arm64|aarch64) ARCH="arm64" ;; *) ARCH="x86_64" ;; esac
          ASSET="jerry-${OS}-${ARCH}.tar.gz"
          mkdir -p /tmp/seed
          curl -fsSL "https://github.com/jeffscottbrown/jerry-lang/releases/download/${VERSION}/${ASSET}" \
            -o "/tmp/seed/${ASSET}"
          tar xz -C . -f "/tmp/seed/$ASSET" jerry-compiler
          chmod +x jerry-compiler
          mv jerry-compiler jerry-compiler-seed

      - name: Build jerry-compiler (two-stage bootstrap)
        if: |
          (matrix.goos == 'linux' && runner.os == 'Linux') ||
          (matrix.goos == 'darwin' && runner.os == 'macOS')
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          TARGET_FLAG=""
          if [ -n "${{ matrix.jerry_target }}" ]; then
            TARGET_FLAG="-target ${{ matrix.jerry_target }}"
          fi
          # Stage 1: seed doesn't know flush_stdout; strip the call so it can compile.
          grep -v 'flush_stdout()' self-host/main.jer > /tmp/main_patched.jer
          SRCS=$(ls self-host/*.jer | grep -v 'self-host/main.jer' | grep -v '_test.jer' | sort | tr '\n' ' ')
          ./jerry-compiler-seed $SRCS /tmp/main_patched.jer --ir > self-host-stage1.ll
          clang $TARGET_FLAG -O0 self-host-stage1.ll jerry_runtime.a -o jerry-compiler-stage1 -lm
          chmod +x jerry-compiler-stage1
          # Stage 2: stage-1 knows flush_stdout; compile the full source.
          ./jerry-compiler-stage1 self-host/ --ir > self-host.ll
          clang $TARGET_FLAG -O0 self-host.ll jerry_runtime.a -o jerry-compiler -lm
          chmod +x jerry-compiler

      - name: Build jerry-test (native only)
        if: |
          (matrix.goos == 'linux' && runner.os == 'Linux') ||
          (matrix.goos == 'darwin' && runner.os == 'macOS')
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          TARGET_FLAG=""
          if [ -n "${{ matrix.jerry_target }}" ]; then
            TARGET_FLAG="-target ${{ matrix.jerry_target }}"
          fi
          ./jerry-compiler cmd/jerry-test/ -o jerry-test $TARGET_FLAG

      - name: Build jerry-create (native only)
        if: |
          (matrix.goos == 'linux' && runner.os == 'Linux') ||
          (matrix.goos == 'darwin' && runner.os == 'macOS')
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          TARGET_FLAG=""
          if [ -n "${{ matrix.jerry_target }}" ]; then
            TARGET_FLAG="-target ${{ matrix.jerry_target }}"
          fi
          ./jerry-compiler cmd/jerry-create/ -o jerry-create $TARGET_FLAG

      - name: Build jerry-sweep (native only)
        if: |
          (matrix.goos == 'linux' && runner.os == 'Linux') ||
          (matrix.goos == 'darwin' && runner.os == 'macOS')
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          TARGET_FLAG=""
          if [ -n "${{ matrix.jerry_target }}" ]; then
            TARGET_FLAG="-target ${{ matrix.jerry_target }}"
          fi
          ./jerry-compiler cmd/jerry-sweep/ -o jerry-sweep $TARGET_FLAG

      - name: Build jerry-get (native only)
        if: |
          (matrix.goos == 'linux' && runner.os == 'Linux') ||
          (matrix.goos == 'darwin' && runner.os == 'macOS')
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          TARGET_FLAG=""
          if [ -n "${{ matrix.jerry_target }}" ]; then
            TARGET_FLAG="-target ${{ matrix.jerry_target }}"
          fi
          ./jerry-compiler cmd/jerry-get/ -o jerry-get $TARGET_FLAG

      - name: Build jerry-lsp (native only)
        if: |
          (matrix.goos == 'linux' && runner.os == 'Linux') ||
          (matrix.goos == 'darwin' && runner.os == 'macOS')
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          TARGET_FLAG=""
          if [ -n "${{ matrix.jerry_target }}" ]; then
            TARGET_FLAG="-target ${{ matrix.jerry_target }}"
          fi
          ./jerry-compiler cmd/jerry-lsp/ -o jerry-lsp $TARGET_FLAG

      - name: Build jerry-main (native Jerry dispatcher)
        if: |
          (matrix.goos == 'linux' && runner.os == 'Linux') ||
          (matrix.goos == 'darwin' && runner.os == 'macOS')
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
        run: |
          TARGET_FLAG=""
          if [ -n "${{ matrix.jerry_target }}" ]; then
            TARGET_FLAG="-target ${{ matrix.jerry_target }}"
          fi
          # Inject the release version into version.jer, compile, then restore dev default.
          echo "fn jerry_version(): string { return \"${{ env.RELEASE_TAG }}\"; }" > cmd/jerry-main/version.jer
          ./jerry-compiler cmd/jerry-main/ -o ${{ matrix.asset_name }} $TARGET_FLAG
          echo 'fn jerry_version(): string { return "dev"; }' > cmd/jerry-main/version.jer

      - name: Smoke-test binary (native only)
        if: |
          (matrix.goos == 'linux' && runner.os == 'Linux') ||
          (matrix.goos == 'darwin' && runner.os == 'macOS')
        env:
          JERRY_RUNTIME: ${{ github.workspace }}/jerry_runtime.a
          JERRY_STDLIB: ${{ github.workspace }}/stdlib-dist
          JERRY_COMPILER: ${{ github.workspace }}/jerry-compiler
          JERRY_TEST: ${{ github.workspace }}/jerry-test
          JERRY_CREATE: ${{ github.workspace }}/jerry-create
          JERRY_SWEEP: ${{ github.workspace }}/jerry-sweep
          JERRY_GET: ${{ github.workspace }}/jerry-get
          JERRY_LSP: ${{ github.workspace }}/jerry-lsp
        run: |
          ./${{ matrix.asset_name }} --version
          ./${{ matrix.asset_name }} run examples/hello.jer
          ./${{ matrix.asset_name }} run examples/fibonacci.jer
          ./${{ matrix.asset_name }} run examples/strings.jer

      - name: Create archive
        run: |
          EXTRAS=""
          [ -f jerry-compiler ] && EXTRAS="$EXTRAS jerry-compiler"
          [ -f jerry-test ]     && EXTRAS="$EXTRAS jerry-test"
          [ -f jerry-create ]   && EXTRAS="$EXTRAS jerry-create"
          [ -f jerry-sweep ]    && EXTRAS="$EXTRAS jerry-sweep"
          [ -f jerry-lsp ]      && EXTRAS="$EXTRAS jerry-lsp"
          [ -f jerry-get ]      && EXTRAS="$EXTRAS jerry-get"
          tar -czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.asset_name }} $EXTRAS

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz
          retention-days: 1

  # ── Create GitHub Release with all platform archives ───────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Jerry ${{ env.RELEASE_TAG }}"
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt

      - name: Update Homebrew tap formula
        if: ${{ !contains(env.RELEASE_TAG, '-') }}   # skip pre-releases
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          TARBALL_URL="https://github.com/jeffscottbrown/jerry-lang/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -fsSL "$TARBALL_URL" | sha256sum | awk '{print $1}')
          git clone "https://github.com/jeffscottbrown/homebrew-jerry.git" tap
          sed -i "s|url \".*\"|url \"${TARBALL_URL}\"|" tap/Formula/jerry.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" tap/Formula/jerry.rb
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/jeffscottbrown/homebrew-jerry.git"
          git add Formula/jerry.rb
          git commit -m "chore: update jerry to ${TAG}"
          git push
